name: Build and Publish Docker Image

# 触发条件：当推送到 main/master 分支，或者发布新标签 (如 v1.0.0) 时触发
on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # 赋予 GITHUB_TOKEN 推送镜像到 ghcr.io 的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 设置 QEMU (用于支持多架构/ARM构建)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. 设置 Docker Buildx (多架构构建的核心工具)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录到 GitHub 容器镜像仓库 (ghcr.io)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 这是 GitHub 自动提供的 token，无需手动配置

      # 4. 自动提取 Docker 标签和元数据 (比如 latest, v1.0 等)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      # 5. 构建并推送多架构镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 如果是 PR 阶段，只构建测试，不推送；如果是 push 到主分支，则推送
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 在这里指定你需要兼容的架构：x86 和 arm64
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max