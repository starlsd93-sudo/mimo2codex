name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag (auto = pick from semver pre-release suffix; otherwise "latest" / "beta" / "next" / etc.)'
        required: false
        default: 'auto'
        type: string
      prerelease:
        description: 'Mark GitHub Release as pre-release? (auto = same rule as dist_tag)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - 'true'
          - 'false'

permissions:
  contents: write   # `gh release create` needs this; was `read` before adding the GitHub Release step.
  id-token: write   # npm provenance.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the annotated tag's message body for the "Create GitHub
          # Release" step below (which reads it via `git tag -l --format`)
          # and a non-shallow history for `--generate-notes` to walk back
          # to the previous release. fetch-depth=0 covers both.
          #
          # Don't combine `fetch-tags: true` with the default shallow clone —
          # actions/checkout has a bug where it tries to fetch both the
          # commit SHA and the tag ref into the same ref name and fails
          # with "Cannot fetch both <sha> and refs/tags/<name>".
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      # Decide the npm dist-tag and whether this is a GitHub pre-release.
      #
      # Default behavior (dist_tag input = "auto"):
      #   - Version contains a SemVer pre-release suffix (e.g. 0.2.5-beta.0,
      #     0.3.0-alpha.1, 1.0.0-rc.2) → use the identifier (beta/alpha/rc/...)
      #     as the dist-tag, AND mark the GitHub Release as prerelease.
      #   - Version is plain (e.g. 0.2.5)                  → dist-tag "latest",
      #     GitHub Release is a regular (non-pre) release.
      #
      # Manual override via workflow_dispatch:
      #   - dist_tag: any non-"auto" string (latest, beta, next, canary, ...)
      #   - prerelease: "auto" | "true" | "false"
      - name: Compute npm dist-tag and prerelease flag
        id: meta
        run: |
          set -e
          PKG_VERSION=$(node -p "require('./package.json').version")
          DIST_TAG_INPUT="${{ github.event.inputs.dist_tag }}"
          PRERELEASE_INPUT="${{ github.event.inputs.prerelease }}"

          # Detect SemVer pre-release: anything after the first `-` in the
          # version string (the part before any `+` build metadata).
          #   0.2.5-beta.0  → PRE_ID=beta, IS_PRE=true
          #   0.3.0-alpha.1 → PRE_ID=alpha
          #   0.2.5         → PRE_ID="",  IS_PRE=false
          if [[ "$PKG_VERSION" == *-* ]]; then
            PRE_PART="${PKG_VERSION#*-}"
            PRE_PART="${PRE_PART%%+*}"
            PRE_ID="${PRE_PART%%.*}"
            DETECTED_TAG="${PRE_ID:-next}"
            DETECTED_PRE=true
          else
            DETECTED_TAG=latest
            DETECTED_PRE=false
          fi

          # Apply manual overrides if provided.
          if [ -n "$DIST_TAG_INPUT" ] && [ "$DIST_TAG_INPUT" != "auto" ]; then
            DIST_TAG="$DIST_TAG_INPUT"
          else
            DIST_TAG="$DETECTED_TAG"
          fi

          case "$PRERELEASE_INPUT" in
            true)  IS_PRERELEASE=true ;;
            false) IS_PRERELEASE=false ;;
            *)     IS_PRERELEASE="$DETECTED_PRE" ;;
          esac

          echo "version=$PKG_VERSION"            >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG"              >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE"    >> "$GITHUB_OUTPUT"
          echo "::notice::Publishing $PKG_VERSION → npm dist-tag '$DIST_TAG' (prerelease=$IS_PRERELEASE)"

      # Run the same build-all + tests we expect prepublishOnly to run, so any
      # failure (frontend build, type errors, etc.) surfaces before we hit
      # `npm publish` and consumes the version slot. `npm publish` will still
      # re-run prepack to produce the final tarball.
      - run: npm run build:all
      - run: npm test

      # Auth via Trusted Publisher (OIDC) — npm verifies the GitHub Actions
      # OIDC token against the publisher config registered on the npm package
      # (Settings → Trusted Publisher). No NPM_TOKEN secret needed; the
      # `id-token: write` permission at the top of this file is what enables it.
      # Same OIDC token also powers `--provenance`.
      #
      # Migrated 2026-05-20 after npm rotated long-lived 2FA-bypass tokens as a
      # supply-chain hardening measure ("Mini Shai-Hulud"). See:
      # https://docs.npmjs.com/trusted-publishers
      - run: npm publish --tag "${{ steps.meta.outputs.dist_tag }}" --provenance --access public

      # Create the GitHub Release ONLY after a successful npm publish, so the
      # sidebar "Latest" badge never points at a version that didn't actually
      # ship. Title comes from the tag's annotation subject (e.g. the message
      # `scripts/release.mjs` writes — "0.1.17 - [fix] xxx"). Body is auto
      # generated from commits between this tag and the previous release.
      # `--prerelease` is added when the version is a SemVer pre-release so
      # the GitHub UI shows "Pre-release" instead of "Latest".
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE=$(git tag -l --format='%(contents:subject)' "$TAG")
          if [ -z "$TITLE" ]; then TITLE="$TAG"; fi
          ARGS=( "$TAG" --verify-tag --title "$TITLE" --generate-notes )
          if [ "${{ steps.meta.outputs.is_prerelease }}" = "true" ]; then
            ARGS+=( --prerelease )
          fi
          gh release create "${ARGS[@]}"
